version: '3.9'

services:
  # ── Laravel API ──────────────────────────────────────────────
  api:
    image: php:8.2-cli
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    command: >
      sh -c "apt-get update -qq &&
             apt-get install -y -qq libpq-dev zip unzip curl git &&
             docker-php-ext-install pdo pdo_pgsql &&
             curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer &&
             composer install --no-interaction --prefer-dist &&
             php artisan serve --host=0.0.0.0 --port=8000"
    environment:
      DB_CONNECTION: pgsql
      DB_HOST:       ep-billowing-glitter-apal87to-pooler.c-7.us-east-1.aws.neon.tech
      DB_PORT:       5432
      DB_DATABASE:   GuGe
      DB_USERNAME:   neondb_owner
      DB_PASSWORD:   npg_KvyAOICsPQ49
      DB_SSLMODE:    require
      APP_KEY:       base64:REPLACE_WITH_KEY
      APP_ENV:       local
      FRONTEND_URL:  http://localhost:3000

  # ── Next.js Frontend ─────────────────────────────────────────
  web:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000/api
    depends_on:
      - api
